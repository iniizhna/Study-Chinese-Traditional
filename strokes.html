  <style>
    /* ── Stats bar ───────────────────────────────────────────── */
    .rad-stats {
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      margin-bottom: .9rem;
    }
    .rad-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .6rem .95rem;
      text-align: center;
      min-width: 80px;
      flex: 1;
    }
    .rad-stat-val {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .rad-stat-label {
      font-size: .67rem;
      color: var(--muted);
      margin-top: .2rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
    }

    /* ── Progress bar ────────────────────────────────────────── */
    .rad-prog-wrap {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.4rem;
    }
    .rad-prog-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .rad-prog-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width .4s ease;
    }
    .rad-prog-label {
      font-size: .75rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 600;
    }

    /* ── Controls ────────────────────────────────────────────── */
    .rad-controls {
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .rad-controls .search-input { max-width: 280px; }
    .result-badge {
      font-size: .75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .15rem .65rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Detail panel ────────────────────────────────────────── */
    .rad-detail {
      background: var(--bg);
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-lg);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1.4rem;
      position: relative;
      box-shadow: 0 4px 20px rgba(59,111,232,.1);
    }
    .rad-detail-close {
      position: absolute;
      top: .75rem;
      right: .9rem;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: .1rem .35rem;
      border-radius: var(--radius);
      transition: background var(--transition), color var(--transition);
    }
    .rad-detail-close:hover { background: var(--surface); color: var(--text); }

    .rad-detail-body {
      display: flex;
      gap: 1.75rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .rad-detail-char {
      font-family: var(--font-chinese);
      font-size: 5rem;
      line-height: 1;
      font-weight: 900;
      flex-shrink: 0;
      color: var(--text);
    }
    .rad-detail-info { flex: 1; min-width: 180px; }
    .rad-detail-py {
      color: var(--primary);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: .2rem;
    }
    .rad-detail-meaning {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: .55rem;
    }
    .rad-detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      margin-bottom: .9rem;
      font-size: .8rem;
      color: var(--muted);
    }
    .rad-detail-meta span {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .15rem .6rem;
    }
    .rad-detail-examples-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    .rad-detail-examples {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-bottom: 1rem;
    }
    .ex-chip {
      font-family: var(--font-chinese);
      font-size: 1.15rem;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: var(--radius);
      padding: .25rem .65rem;
      cursor: default;
      transition: background var(--transition);
      font-weight: 600;
    }
    .rad-practice-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .42rem 1rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--transition);
    }
    .rad-practice-btn:hover { background: var(--primary-hover); }

    /* ── Radical grid ────────────────────────────────────────── */
    .rad-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .75rem;
    }

    /* ── Radical card ────────────────────────────────────────── */
    .rad-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: .85rem .75rem .7rem;
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition), background var(--transition);
      position: relative;
      text-align: center;
    }
    .rad-card:hover { box-shadow: var(--shadow-up); border-color: var(--primary); }
    .rad-card.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,111,232,.18); }
    .rad-card.learned-card { border-color: #86efac; background: #f0fdf4; }

    /* top-left stroke count */
    .rad-stroke-badge {
      position: absolute;
      top: .45rem;
      left: .5rem;
      font-size: .62rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .05rem .38rem;
      line-height: 1.5;
    }

    /* top-right category badge */
    .rad-cat-badge {
      position: absolute;
      top: .45rem;
      right: .5rem;
      font-size: .58rem;
      font-weight: 700;
      border-radius: 999px;
      padding: .06rem .4rem;
      line-height: 1.5;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    /* bookmark toggle */
    .rad-bookmark {
      position: absolute;
      bottom: .45rem;
      right: .5rem;
      font-size: .9rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: .45;
      transition: opacity var(--transition), transform var(--transition);
    }
    .rad-bookmark:hover { opacity: 1; transform: scale(1.2); }
    .rad-bookmark.marked { opacity: 1; }

    .rad-char {
      font-family: var(--font-chinese);
      font-size: 2.25rem;
      line-height: 1.1;
      font-weight: 700;
      margin-bottom: .08rem;
    }
    .rad-alt {
      font-family: var(--font-chinese);
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: .1rem;
      min-height: 1em;
    }
    .rad-py {
      color: var(--primary);
      font-size: .82rem;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .rad-meaning {
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── Category colors ─────────────────────────────────────── */
    .cat-nature  { background: #E1F5EE; color: #0F6E56; }
    .cat-body    { background: #FBEAF0; color: #993556; }
    .cat-people  { background: #E6F1FB; color: #185FA5; }
    .cat-objects { background: #FAEEDA; color: #854F0B; }
    .cat-actions { background: #EEEDFE; color: #534AB7; }

    /* ── Empty state ─────────────────────────────────────────── */
    .rad-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .rad-empty-icon { font-size: 2.5rem; margin-bottom: .5rem; }

    @media (max-width: 480px) {
      .rad-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .rad-detail-char { font-size: 3.5rem; }
    }
  </style>

  people:  '人 People',
  objects: '物品 Objects',
  actions: '動作 Actions',
};

let activeFilter = 'all';
let searchQuery  = '';
let selectedChar = null;

/* ─────────────────────────────────────────────────────────────
   localStorage
───────────────────────────────────────────────────────────── */
function getLearnedSet() {
  try { return new Set(JSON.parse(localStorage.getItem('learned_radicals') || '[]')); }
  catch { return new Set(); }
}
function saveLearnedSet(set) {
  localStorage.setItem('learned_radicals', JSON.stringify([...set]));
}

/* ─────────────────────────────────────────────────────────────
   Stats bar
───────────────────────────────────────────────────────────── */
function renderStats() {
  const learned = getLearnedSet();
  const counts  = { nature:0, body:0, people:0, objects:0, actions:0 };
  for (const r of RADICALS) counts[r.cat]++;

  const metrics = [
    { val: RADICALS.length,   label: 'Total' },
    { val: counts.nature,     label: '自然 Nature' },
    { val: counts.body,       label: '身體 Body' },
    { val: counts.people,     label: '人 People' },
    { val: counts.objects,    label: '物品 Objects' },
    { val: counts.actions,    label: '動作 Actions' },
  ];

  document.getElementById('radStats').innerHTML = metrics.map(m => `
    <div class="rad-stat-card">
      <div class="rad-stat-val">${m.val}</div>
      <div class="rad-stat-label">${m.label}</div>
    </div>`).join('');

  const pct = RADICALS.length ? learned.size / RADICALS.length * 100 : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent =
    `${learned.size} / ${RADICALS.length} learned`;
}

/* ─────────────────────────────────────────────────────────────
   Category chips
───────────────────────────────────────────────────────────── */
function renderCatChips() {
  const cats = ['all', 'nature', 'body', 'people', 'objects', 'actions'];
  document.getElementById('catChips').innerHTML = cats.map(c => `
    <button class="chip ${activeFilter === c ? 'active' : ''}"
            onclick="setFilter('${c}')">${CAT_LABELS[c]}</button>`).join('');
}

/* ─────────────────────────────────────────────────────────────
   Grid
───────────────────────────────────────────────────────────── */
function filteredList() {
  let list = RADICALS;
  if (activeFilter !== 'all') list = list.filter(r => r.cat === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(r =>
      r.char.includes(q) ||
      (r.alt || '').includes(q) ||
      r.py.toLowerCase().includes(q) ||
      r.meaning.toLowerCase().includes(q)
    );
  }
  return list;
}

function renderGrid() {
  const list    = filteredList();
  const learned = getLearnedSet();
  const grid    = document.getElementById('radGrid');

  document.getElementById('resultBadge').textContent =
    `${list.length} radical${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="rad-empty">
      <div class="rad-empty-icon">🔍</div>
      <div>No radicals match your search.</div></div>`;
    return;
  }

  grid.innerHTML = list.map(r => {
    const isLearned  = learned.has(r.char);
    const isSelected = selectedChar === r.char;
    return `
      <div class="rad-card ${isSelected ? 'selected' : ''} ${isLearned ? 'learned-card' : ''}"
           onclick="openDetail('${r.char}')">
        <span class="rad-stroke-badge">${r.strokes}画</span>
        <span class="rad-cat-badge cat-${r.cat}">${r.cat}</span>
        <div class="rad-char chinese">${r.char}</div>
        <div class="rad-alt">${r.alt || ''}</div>
        <div class="rad-py">${r.py}</div>
        <div class="rad-meaning">${r.meaning}</div>
        <button class="rad-bookmark ${isLearned ? 'marked' : ''}"
                onclick="toggleLearned(event,'${r.char}')"
                title="${isLearned ? 'Unmark' : 'Mark as learned'}">
          ${isLearned ? '★' : '☆'}
        </button>
      </div>`;
  }).join('');
}

/* ─────────────────────────────────────────────────────────────
   Detail panel
───────────────────────────────────────────────────────────── */
function openDetail(char) {
  const r = RADICALS.find(x => x.char === char);
  if (!r) return;
  selectedChar = char;

  const learned = getLearnedSet();
  const isLearned = learned.has(char);

  document.getElementById('radDetailBody').innerHTML = `
    <div class="rad-detail-char chinese">${r.char}</div>
    <div class="rad-detail-info">
      <div class="rad-detail-py">${r.py}</div>
      <div class="rad-detail-meaning">${r.meaning}</div>
      <div class="rad-detail-meta">
        <span>${r.strokes} strokes</span>
        ${r.alt ? `<span>Alt form: <span style="font-family:var(--font-chinese)">${r.alt}</span></span>` : ''}
        <span class="rad-cat-badge cat-${r.cat}" style="position:static;font-size:.7rem;padding:.15rem .6rem">${CAT_LABELS[r.cat]}</span>
      </div>
      <div class="rad-detail-examples-label">Example characters</div>
      <div class="rad-detail-examples">
        ${r.examples.map(e => `<span class="ex-chip">${e}</span>`).join('')}
      </div>
      <div style="display:flex;gap:.55rem;align-items:center;flex-wrap:wrap">
        <a class="rad-practice-btn" href="conversation.html">
          💬 Practice conversation
        </a>
        <button class="rad-practice-btn"
                style="background:${isLearned ? 'var(--success)' : 'transparent'};
                       color:${isLearned ? '#fff' : 'var(--primary)'};
                       border:1.5px solid ${isLearned ? 'var(--success)' : 'var(--primary)'}"
                onclick="toggleLearned(null,'${r.char}')">
          ${isLearned ? '★ Learned' : '☆ Mark learned'}
        </button>
      </div>
    </div>`;

  const panel = document.getElementById('radDetail');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  renderGrid();
}

function closeDetail() {
  document.getElementById('radDetail').style.display = 'none';
  selectedChar = null;
  renderGrid();
}

/* ─────────────────────────────────────────────────────────────
   Interactions
───────────────────────────────────────────────────────────── */
function setFilter(cat) {
  activeFilter = cat;
  closeDetail();
  renderCatChips();
  renderGrid();
}

function toggleLearned(evt, char) {
  if (evt) evt.stopPropagation();
  const set = getLearnedSet();
  if (set.has(char)) { set.delete(char); } else { set.add(char); }
  saveLearnedSet(set);
  renderStats();
  renderGrid();
  if (selectedChar === char) openDetail(char);
}

/* ─────────────────────────────────────────────────────────────
   Init
───────────────────────────────────────────────────────────── */
document.getElementById('radSearch').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderCatChips();
  renderGrid();
});

document.getElementById('navToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

renderStats();
renderCatChips();
renderGrid();
</script>
</body>
</html>
