  <div class="page-header">
    <h1 class="page-title">筆順 Stroke Order</h1>
    <p class="page-subtitle">Use <strong>Next ›</strong> to step through strokes one at a time, or <strong>▶</strong> to animate the full sequence automatically.</p>
  </div>

  <div style="margin-bottom:1.25rem">
    <button class="btn btn-ghost btn-sm" onclick="animateAll()">▶ Animate All</button>
    <button class="btn btn-ghost btn-sm" style="margin-left:.4rem" onclick="resetAll()">↺ Reset All</button>
  </div>

  <div class="strokes-grid" id="strokesGrid">
    <div class="loading-state">Loading stroke data…</div>
  </div>

<script>
  document.getElementById('navToggle').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('open');
  });
  function animateAll() {
    strokesData.forEach(s => {
      if (typeof strokeAnimate === 'function') strokeAnimate(s.id, s.strokeCount);
    });
  }
  function resetAll() {
    strokesData.forEach(s => {
      if (typeof strokeReset === 'function') strokeReset(s.id, s.strokeCount);
    });
  }
</script>
