<main>
  <!-- Passage list -->
  <div id="listView">
    <div class="page-header">
      <h1 class="page-title">閱讀 Reading</h1>
      <p class="page-subtitle">Click any passage to open it. Tap annotated words for instant pinyin and definitions.</p>
    </div>

    <div class="reading-list" id="readingList">
      <div class="loading-state">Loading passages…</div>
    </div>
  </div>

  <!-- Single passage view -->
  <div class="passage-view" id="passageView">
    <div class="passage-header">
      <button class="btn btn-ghost btn-sm" onclick="backToList()">← Back</button>
      <div id="passageTitle" class="passage-title"></div>
    </div>

    <div class="passage-controls">
      <button class="btn btn-outline btn-sm" id="btnPinyinToggle">Hide Pinyin</button>
      <button class="btn btn-primary btn-sm" id="btnMarkRead">✓ Mark as Read</button>
    </div>

    <div class="passage-text" id="passageTextEl"></div>

    <p style="font-size:.8rem;color:var(--muted);margin-top:1rem">
      💡 Tap any highlighted word to see its pinyin and meaning.
    </p>
  </div>
</main>
